<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador - Roquistas Quemadas</title>
    <!-- Outfit y Montserrat de Google Fonts para diseño premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --fire-color: #ff5500;
            --fire-glow: rgba(255, 85, 0, 0.4);
            --text-color: #ffffff;
            --accent-color: #ffd700;
            --bg-glass: rgba(15, 12, 28, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: transparent !important;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
        }

        /* ===== CONTENEDOR DEL CONTADOR ===== */
        .counter-card {
            background: var(--bg-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 
                        inset 0 0 20px rgba(255, 255, 255, 0.02);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            text-align: center;
            min-width: 220px;
        }

        .counter-card:hover {
            border-color: rgba(255, 85, 0, 0.25);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 
                        0 0 15px rgba(255, 85, 0, 0.15);
        }

        /* ===== FUEGUITO ANIMADO (SVG) ===== */
        .fire-container {
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .fire-icon {
            width: 50px;
            height: 50px;
            animation: flicker 2s infinite alternate ease-in-out;
            filter: drop-shadow(0 0 6px var(--fire-glow));
        }

        @keyframes flicker {
            0% {
                transform: scale(0.96) rotate(-1deg);
                filter: drop-shadow(0 0 6px rgba(255, 85, 0, 0.5));
            }
            50% {
                transform: scale(1.05) rotate(1.5deg);
                filter: drop-shadow(0 0 15px rgba(255, 120, 0, 0.75));
            }
            100% {
                transform: scale(0.98) rotate(-0.5deg);
                filter: drop-shadow(0 0 8px rgba(255, 60, 0, 0.6));
            }
        }

        /* ===== FILA CENTRAL (BOTONES Y NÚMERO) ===== */
        .counter-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 5px 0;
            position: relative;
            width: 100%;
        }

        /* Botones interactivos (+ y -) */
        .ctrl-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-color);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
            opacity: 0; /* Ocultos por defecto para que se vea limpio en stream */
            pointer-events: none;
        }

        /* Se muestran al pasar el mouse por encima (Interactuar en OBS) */
        .counter-card:hover .ctrl-btn {
            opacity: 0.75;
            pointer-events: auto;
        }

        .ctrl-btn:hover {
            background: var(--fire-color);
            border-color: var(--fire-color);
            color: #ffffff;
            transform: scale(1.15);
            box-shadow: 0 0 8px var(--fire-glow);
            opacity: 1 !important;
        }

        .ctrl-btn:active {
            transform: scale(0.95);
        }

        /* Valor numérico */
        #counter-value {
            font-size: 46px;
            font-weight: 900;
            color: var(--text-color);
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            min-width: 60px;
            display: inline-block;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        #counter-value.pop {
            transform: scale(1.25);
            color: var(--accent-color);
        }

        /* ===== ETIQUETA INFERIOR ===== */
        .counter-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-color);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
            margin-top: 2px;
            opacity: 0.95;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 8px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="counter-card" title="Usa la rueda del ratón, haz doble clic para editar o usa las flechas arriba/abajo">
        
        <!-- Fueguito -->
        <div class="fire-container">
            <svg class="fire-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#ff1a00" />
                        <stop offset="45%" stop-color="#ff7700" />
                        <stop offset="80%" stop-color="#ffbb00" />
                        <stop offset="100%" stop-color="#ffffaa" />
                    </linearGradient>
                </defs>
                <!-- Flame Outer -->
                <path d="M50,95 C75,95 90,75 90,52 C90,20 62,8 50,3 C38,8 10,20 10,52 C10,75 25,95 50,95 Z" fill="url(#fireGrad)" />
                <!-- Flame Inner -->
                <path d="M50,95 C66,95 76,82 76,65 C76,43 56,28 50,23 C44,28 24,43 24,65 C24,82 34,95 50,95 Z" fill="#ffaa00" opacity="0.85" />
                <!-- Flame Core -->
                <path d="M50,95 C58,95 65,88 65,74 C65,55 52,43 50,38 C48,43 35,55 35,74 C35,88 42,95 50,95 Z" fill="#ffea55" opacity="0.9" />
                <!-- Small spark details -->
                <circle cx="28" cy="35" r="2" fill="#ffd000" opacity="0.6" />
                <circle cx="72" cy="40" r="1.5" fill="#ff5500" opacity="0.5" />
                <circle cx="50" cy="15" r="2.5" fill="#ffffea" opacity="0.8" />
            </svg>
        </div>

        <!-- Fila con botones e interacción -->
        <div class="counter-row">
            <button class="ctrl-btn" id="btn-minus" title="Restar 1 (Flechita abajo / Rueda abajo)">-</button>
            <span id="counter-value">0</span>
            <button class="ctrl-btn" id="btn-plus" title="Sumar 1 (Flechita arriba / Rueda arriba)">+</button>
        </div>

        <!-- Texto inferior -->
        <div class="counter-label">roquitas quemadas</div>

    </div>

    <script>
        // Elementos del DOM
        const valueSpan = document.getElementById('counter-value');
        const btnMinus = document.getElementById('btn-minus');
        const btnPlus = document.getElementById('btn-plus');
        const card = document.querySelector('.counter-card');

        // Cargar valor inicial desde localStorage
        let count = parseInt(localStorage.getItem('roquistas_count')) || 0;
        valueSpan.innerText = count;

        // Función para actualizar y guardar el valor
        function updateCount(newVal) {
            if (newVal < 0) newVal = 0; // Evitar números negativos
            count = newVal;
            valueSpan.innerText = count;
            localStorage.setItem('roquistas_count', count);
            
            // Animación de pop/latido al cambiar
            valueSpan.classList.remove('pop');
            void valueSpan.offsetWidth; // Forzar reflow para reiniciar la animación
            valueSpan.classList.add('pop');
            setTimeout(() => valueSpan.classList.remove('pop'), 150);
        }

        // Eventos de botones click
        btnPlus.addEventListener('click', (e) => {
            e.stopPropagation();
            updateCount(count + 1);
        });

        btnMinus.addEventListener('click', (e) => {
            e.stopPropagation();
            updateCount(count - 1);
        });

        // 1. Soporte para rueda de ratón (mouse wheel) al pasar el cursor sobre el número
        card.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) {
                updateCount(count + 1); // Scroll hacia arriba suma
            } else {
                updateCount(count - 1); // Scroll hacia abajo resta
            }
        });

        // 2. Soporte para teclado (flechas Arriba y Abajo) si la página tiene el foco
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                updateCount(count + 1);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                updateCount(count - 1);
            }
        });

        // 3. Soporte para doble clic en el número para escribir una cantidad exacta
        valueSpan.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            const inputVal = prompt("Escribe el número exacto de roquitas quemadas:", count);
            if (inputVal !== null) {
                const parsed = parseInt(inputVal);
                if (!isNaN(parsed)) {
                    updateCount(parsed);
                }
            }
        });
    </script>
</body>
</html>
